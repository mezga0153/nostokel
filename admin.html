<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Štokel — Admin</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Georgia', serif; background: #fff9f4; color: #2c2c2c; padding: 40px 24px; }
    h1 { color: #c0392b; margin-bottom: 8px; }
    .sub { color: #5a5a5a; margin-bottom: 32px; font-size: 0.95rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e0d4c4; border-radius: 8px; overflow: hidden; }
    th { background: #f5ede0; text-align: left; padding: 12px 16px; font-size: 0.9rem; color: #5a5a5a; }
    td { padding: 12px 16px; border-top: 1px solid #e0d4c4; font-size: 0.95rem; vertical-align: top; }
    td.msg { font-style: italic; color: #5a5a5a; max-width: 320px; }
    td.date { color: #aaa; font-size: 0.85rem; white-space: nowrap; }
    .del-btn {
      background: #c0392b; color: #fff; border: none; border-radius: 6px;
      padding: 6px 14px; cursor: pointer; font-size: 0.85rem; font-family: inherit;
    }
    .del-btn:hover { background: #a93226; }
    .empty { text-align: center; padding: 40px; color: #aaa; font-style: italic; }
    .status { margin-bottom: 20px; font-size: 0.95rem; color: #27ae60; min-height: 1.4em; }
  </style>
</head>
<body>
  <h1>No Štokel — Pledge Admin</h1>
  <p class="sub">Logged in via HTTP Basic Auth. <a href="/">← Back to site</a></p>
  <p class="status" id="status"></p>
  <table id="pledgeTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Message</th>
        <th>Date</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="5" class="empty">Loading…</td></tr>
    </tbody>
  </table>

  <script>
    function fmt(iso) {
      try { return new Date(iso).toLocaleString('en-GB'); } catch { return iso; }
    }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function load() {
      const res = await fetch('/api/admin/pledges', { credentials: 'include' });
      if (res.status === 401) { document.getElementById('tbody').innerHTML = '<tr><td colspan="5" class="empty">Not authorised.</td></tr>'; return; }
      const pledges = await res.json();
      const tbody = document.getElementById('tbody');
      if (!pledges.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">No pledges yet.</td></tr>'; return; }
      tbody.innerHTML = pledges.map(p => `
        <tr id="row-${p.id}">
          <td>${p.id}</td>
          <td>${esc(p.name)}</td>
          <td class="msg">${p.message ? esc(p.message) : '<span style="color:#ccc">—</span>'}</td>
          <td class="date">${fmt(p.created_at)}</td>
          <td><button class="del-btn" onclick="del(${p.id})">Delete</button></td>
        </tr>
      `).join('');
    }

    async function del(id) {
      if (!confirm('Delete this pledge?')) return;
      const res = await fetch('/api/admin/pledges', {
        method: 'DELETE',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      if (res.ok) {
        document.getElementById(`row-${id}`)?.remove();
        document.getElementById('status').textContent = `Pledge #${id} deleted.`;
        setTimeout(() => document.getElementById('status').textContent = '', 3000);
      }
    }

    load();
  </script>
</body>
</html>
